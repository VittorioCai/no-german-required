# Your job-search profile. Edit this — it drives everything.

# What kind of positions? (must appear in the job TITLE)
role_keywords:
  - werkstudent
  - working student
  - intern
  - internship
  - praktikum
  - praktikant

# Your field (must appear somewhere in the posting)
field_keywords:
  - supply chain
  - logistics
  - operations
  - procurement
  - scm
  - data
  - analytics
  - analyst
  - business intelligence
  - machine learning
  - artificial intelligence

# Target cities (substring match on location; empty list = no city filter).
# germany_only keeps foreign offices of international companies out
# (N26 Barcelona, HelloFresh US, ...) while accepting any German location.
cities: []
germany_only: true

# Your German level: A1/A2/B1/B2/C1. Jobs requiring more get score-capped.
german_level: A1

# Minimum LLM match score (0-100) to appear in "Today's matches"
min_score: 60

# Short pitch used by the LLM to judge fit — write it like a 3-line CV.
cv_summary: |
  Master in Management & Digital Technology (MMDT) student at TUM.
  Focus: supply chain management, data analytics, and AI applications in
  business. Skills: Python, SQL, Excel, data visualization (Tableau/Power BI),
  basic machine learning. Looking for Werkstudent or internship roles in
  supply chain analytics, data analysis, business intelligence, or AI —
  English working environment. Non-EU student visa (140 full days/year).
